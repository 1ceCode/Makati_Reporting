<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Makati Report Hub</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="split-layout">
        <div class="split-left">
            <img src="assets/logo.png" alt="Report Hub Logo">
        </div>
        <div class="split-right">
            <div class="auth-form-container">
                <h2>USER LOGIN</h2>
                <div id="errorMsg" style="color: red; margin-bottom: 1rem; display: none;"></div>
                <form id="loginForm">
                    <div class="form-group">
                        <input type="text" id="username" class="form-control" placeholder="Username" required>
                    </div>
                    <div class="form-group">
                        <input type="password" id="password" class="form-control" placeholder="Password" required>
                    </div>
                    <div class="form-actions">
                        <span style="font-size: 0.9rem;">Don't have an account? <a href="signup.html">Sign up</a></span>
                        <button type="submit" class="btn" id="loginBtn">GO &rarr;</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        const user = getCurrentUser();
        if (user) {
            window.location.href = user.role === 'admin' ? 'admin_dashboard.html' : 'dashboard.html';
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();
            const err = document.getElementById('errorMsg');
            const btn = document.getElementById('loginBtn');

            btn.textContent = 'Checking...';
            btn.disabled = true;

            const success = await login(u, p);
            if (!success) {
                err.textContent = 'Invalid username or password.';
                err.style.display = 'block';
                btn.textContent = 'GO →';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
