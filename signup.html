<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Makati Report Hub</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="split-layout">
        <div class="split-left">
            <img src="assets/logo.png" alt="Report Hub Logo">
        </div>
        <div class="split-right">
            <div class="auth-form-container">
                <h2>USER SIGN UP</h2>
                <div id="errorMsg" style="color: red; margin-bottom: 1rem; display: none;"></div>
                <form id="signupForm">
                    <div class="form-group">
                        <input type="text" id="firstName" class="form-control" placeholder="First Name" required>
                    </div>
                    <div class="form-group">
                        <input type="text" id="lastName" class="form-control" placeholder="Last Name" required>
                    </div>
                    <div class="form-group">
                        <input type="text" id="username" class="form-control" placeholder="Username" required>
                    </div>
                    <div class="form-group">
                        <input type="password" id="password" class="form-control" placeholder="Password" required>
                    </div>
                    <div class="form-group">
                        <input type="email" id="email" class="form-control" placeholder="Email" required>
                    </div>
                    <div class="form-group">
                        <input type="tel" id="mobile" class="form-control" placeholder="Mobile Number">
                    </div>
                    <div class="form-actions">
                        <span style="font-size: 0.9rem;">Already have an account? <a href="index.html">Login</a></span>
                        <button type="submit" class="btn" id="signupBtn">GO &rarr;</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.getElementById('signupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const data = {
                firstName: document.getElementById('firstName').value.trim(),
                lastName: document.getElementById('lastName').value.trim(),
                username: document.getElementById('username').value.trim(),
                password: document.getElementById('password').value.trim(),
                email: document.getElementById('email').value.trim(),
                mobile: document.getElementById('mobile').value.trim()
            };
            const err = document.getElementById('errorMsg');
            const btn = document.getElementById('signupBtn');

            btn.textContent = 'Saving Online...';
            btn.disabled = true;

            const res = await signup(data);

            if (!res.success) {
                err.textContent = res.message;
                err.style.display = 'block';
                btn.textContent = 'GO →';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
