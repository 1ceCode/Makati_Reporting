<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Report - Makati Report Hub</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <img src="assets/logo.png" alt="Logo">
            <strong>REPORT HUB</strong>
        </div>
        <div class="nav-links">
            <a href="dashboard.html">Home</a>
            <a href="submit-report.html">Submit Report</a>
            <a href="dashboard.html">My Reports</a>
            <a href="#">Profile</a>
            <a href="#" onclick="logout(); return false;">Log out</a>
        </div>
        <div class="nav-contact">
            <span>📞 Department of Environmental Services: 8899-9057</span>
        </div>
    </nav>

    <div class="container">
        <div class="report-form">
            <h2 style="color: var(--primary-color); margin-bottom: 2rem;">Submit a Report</h2>
            
            <div id="errorMsg" style="color: red; margin-bottom: 1rem; display: none;"></div>

            <form id="reportForm">
                <div class="form-group">
                    <label for="issueType">Issue Type</label>
                    <select id="issueType" class="form-control" required>
                        <option value="" disabled selected>Select an issue...</option>
                        <option value="Uncollected Garbage">Uncollected Garbage</option>
                        <option value="Illegal Dumping">Illegal Dumping</option>
                        <option value="Clogged Drainage">Clogged Drainage</option>
                        <option value="Dirty Public Space">Dirty Public Space</option>
                        <option value="Others">Others</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="location">Street Location</label>
                    <input type="text" id="location" class="form-control" required>
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" class="form-control" required></textarea>
                </div>

                <div class="form-group">
                    <label for="imageUpload">Image Upload</label>
                    <input type="file" id="imageUpload" class="form-control" accept="image/*">
                </div>

                <div style="text-align: right; margin-top: 2rem;">
                    <button type="submit" class="btn" id="submitBtn" style="background: transparent; border: none; color: var(--primary-color); font-size: 1.1rem; box-shadow: none;">Submit &rarr;</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        const user = getCurrentUser();
        if (!user || user.role === 'admin') {
            window.location.href = 'index.html';
        }

        document.getElementById('reportForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.textContent = 'Uploading to Cloud...';
            btn.disabled = true;

            const data = {
                issueType: document.getElementById('issueType').value,
                location: document.getElementById('location').value.trim(),
                description: document.getElementById('description').value.trim()
            };
            const fileInput = document.getElementById('imageUpload');
            const file = fileInput.files[0] || null;

            createReport(data, file, function(res) {
                if (res.success) {
                    window.location.href = 'dashboard.html?submitted=true';
                } else {
                    const err = document.getElementById('errorMsg');
                    err.textContent = 'Failed to submit online report. Check database connection.';
                    err.style.display = 'block';
                    btn.textContent = 'Submit →';
                    btn.disabled = false;
                }
            });
        });
    </script>
</body>
</html>
